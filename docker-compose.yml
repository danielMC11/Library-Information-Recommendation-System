services:
  authservice_db:
    image: mysql:8.0
    container_name: auth_mysql
    environment:
      MYSQL_ROOT_PASSWORD: secret-mysql  
      MYSQL_DATABASE: auth_db              
    ports:
      - "3308:3306"
    volumes:
      - mysql_auth:/var/lib/mysql

  catalogservice_db:
    image: postgres:16
    container_name: catalog_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret-postgres
      POSTGRES_DB: catalog_db
    ports:
      - "5435:5432"
    volumes:
      - pgdata_catalog:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d catalog_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  interactionservice_db:
    image: postgres:16
    container_name: interaction_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret-postgres
      POSTGRES_DB: interaction_db
    ports:
      - "5440:5432"
    volumes:
      - pgdata_interaction:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d interaction_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI

  rate_limit_postgres:
    image: postgres:16
    container_name: rate_limit_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret-postgres
      POSTGRES_DB: rate_limit_db
    ports:
      - "5445:5432"
    volumes:
      - pgdata_rate_limit:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rate_limit_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  mysql_auth:
  pgdata_catalog:
  pgdata_interaction:
  pgdata_rate_limit:
  qdrant_data: