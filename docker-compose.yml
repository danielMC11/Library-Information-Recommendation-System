version: "3.9"

services:
  authservice_db:
    image: redis:alpine
    container_name: auth_redis
    command: redis-server --requirepass secret-redis
    ports:
      - "6379:6379"

  catalogservice_db:
    image: postgres:16
    container_name: catalog_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret-postgres
      POSTGRES_DB: catalog_db
    ports:
      - "5435:5432"
    volumes:
      - pgdata_catalog:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d catalog_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  interactionservice_db:
    image: postgres:16
    container_name: interaction_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret-postgres
      POSTGRES_DB: interaction_db
    ports:
      - "5440:5432"
    volumes:
      - pgdata_interaction:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d interaction_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  pgdata_catalog:
  pgdata_interaction:
  qdrant_data: