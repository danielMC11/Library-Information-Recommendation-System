services:
  # ============================================
  # DATABASES & MESSAGE QUEUES
  # ============================================
  authservice-db-prod:
    image: mysql:8.0
    container_name: auth_mysql_prod
    environment:
      MYSQL_ROOT_PASSWORD: secret-mysql
      MYSQL_DATABASE: auth_db
    ports:
      - "3309:3306"
    networks:
      - proyectel-network
    volumes:
      - prod_mysql_auth:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret-mysql"]
      interval: 10s
      timeout: 5s
      retries: 5

  catalogservice-db-prod:
    image: postgres:16
    container_name: catalog_postgres_prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret-postgres
      POSTGRES_DB: catalog_db
    ports:
      - "5436:5432"
    volumes:
      - prod_pgdata_catalog:/var/lib/postgresql/data
    networks:
      - proyectel-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d catalog_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  interactionservice-db-prod:
    image: postgres:16
    container_name: interaction_postgres_prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret-postgres
      POSTGRES_DB: interaction_db
    ports:
      - "5441:5432"
    volumes:
      - prod_pgdata_interaction:/var/lib/postgresql/data
    networks:
      - proyectel-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d interaction_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  rate-limit-db-prod:
    image: postgres:16
    container_name: rate_limit_postgres_prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret-postgres
      POSTGRES_DB: rate_limit_db
    ports:
      - "5446:5432"
    volumes:
      - prod_pgdata_rate_limit:/var/lib/postgresql/data
    networks:
      - proyectel-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rate_limit_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq-prod:
    image: rabbitmq:3-management
    container_name: rabbitmq_prod
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5673:5672"   # AMQP
      - "15673:15672" # Management UI
    networks:
      - proyectel-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - prod_rabbitmq_data:/var/lib/rabbitmq

  qdrant-prod:
    image: qdrant/qdrant:latest
    container_name: qdrant_prod
    ports:
      - "6335:6333" # REST API
      - "6336:6334" # gRPC
    volumes:
      - prod_qdrant_data:/qdrant/storage
    networks:
      - proyectel-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # MICROSERVICES
  # ============================================
  auth-service-prod:
    build:
      context: .
      dockerfile: src/AuthService/Auth.Api/Dockerfile
    container_name: auth-service-prod
    ports:
      - "5132:5132"
    environment:
      - ASPNETCORE_HTTP_PORTS=5132
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__AuthDb=Server=authservice-db-prod;Port=3306;Database=auth_db;User=root;Password=secret-mysql;
      - RabbitMQ__HostName=rabbitmq-prod
      - RabbitMQ__Port=5672
      - RabbitMQ__UserName=guest
      - RabbitMQ__Password=guest
    depends_on:
      authservice-db-prod:
        condition: service_healthy
      rabbitmq-prod:
        condition: service_healthy
    networks:
      - proyectel-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5132/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  catalog-service-prod:
    build:
      context: .
      dockerfile: src/CatalogService/Catalog.Api/Dockerfile
    container_name: catalog-service-prod
    ports:
      - "5281:5281"
    environment:
      - ASPNETCORE_HTTP_PORTS=5281
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=catalogservice-db-prod;Port=5432;Database=catalog_db;Username=postgres;Password=secret-postgres
      - InteractionApi__BaseUrl=http://interaction-service-prod:5144
      - RabbitMQ__HostName=rabbitmq-prod
      - RabbitMQ__Port=5672
      - RabbitMQ__UserName=guest
      - RabbitMQ__Password=guest
    depends_on:
      catalogservice-db-prod:
        condition: service_healthy
      rabbitmq-prod:
        condition: service_healthy
    networks:
      - proyectel-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5281/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  interaction-service-prod:
    build:
      context: .
      dockerfile: src/InteractionService/Interaction.Api/Dockerfile
    container_name: interaction-service-prod
    ports:
      - "5144:5144"
    environment:
      - ASPNETCORE_HTTP_PORTS=5144
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=interactionservice-db-prod;Port=5432;Database=interaction_db;Username=postgres;Password=secret-postgres
      - RabbitMQ__HostName=rabbitmq-prod
      - RabbitMQ__Port=5672
      - RabbitMQ__UserName=guest
      - RabbitMQ__Password=guest
      - CatalogApi__BaseUrl=http://catalog-service-prod:5281
      - InteractionAccumulation__BatchSize=${InteractionAccumulation__BatchSize}
    depends_on:
      interactionservice-db-prod:
        condition: service_healthy
      rabbitmq-prod:
        condition: service_healthy
    networks:
      - proyectel-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5144/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  recommendation-service-prod:
    build:
      context: .
      dockerfile: src/RecommendationService/Recommendation.Api/Dockerfile
    container_name: recommendation-service-prod
    ports:
      - "5221:5221"
    environment:
      - ASPNETCORE_HTTP_PORTS=5221
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__RecommendationDb=Host=rate-limit-db-prod;Port=5432;Database=rate_limit_db;Username=postgres;Password=secret-postgres
      - Gemini__ApiKey=${GEMINI_API_KEY}
      - RateLimit__MaxRpm=${RATELIMIT_MAXRPM}
      - RateLimit__MaxTpm=${RATELIMIT_MAXTPM}
      - RateLimit__MaxRpd=${RATELIMIT_MAXRPD}
      - StudentVector__Alpha=${STUDENTVECTOR_ALPHA}
      - Qdrant__Url=http://qdrant-prod:6334
      - CatalogService__Url=http://catalog-service-prod:5281
      - RabbitMQ__HostName=rabbitmq-prod
      - RabbitMQ__Port=5672
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
    depends_on:
      qdrant-prod:
        condition: service_started
      rabbitmq-prod:
        condition: service_healthy
      rate-limit-db-prod:
        condition: service_healthy
    networks:
      - proyectel-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5221/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s


volumes:
  prod_pgdata_catalog:
  prod_pgdata_interaction:
  prod_qdrant_data:
  prod_rabbitmq_data:
  prod_mysql_auth:
  prod_pgdata_rate_limit:

networks:
  proyectel-network:
    driver: bridge
