version: "3.9"

services:
  # ============================================
  # DATABASES & MESSAGE QUEUES
  # ============================================
  authservice_db:
    image: redis:alpine
    container_name: auth_redis
    command: redis-server --requirepass secret-redis
    ports:
      - "6379:6379"
    networks:
      - proyectel-network
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  catalogservice_db:
    image: postgres:16
    container_name: catalog_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret-postgres
      POSTGRES_DB: catalog_db
    ports:
      - "5435:5432"
    volumes:
      - pgdata_catalog:/var/lib/postgresql/data
    networks:
      - proyectel-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d catalog_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  interactionservice_db:
    image: postgres:16
    container_name: interaction_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret-postgres
      POSTGRES_DB: interaction_db
    ports:
      - "5440:5432"
    volumes:
      - pgdata_interaction:/var/lib/postgresql/data
    networks:
      - proyectel-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d interaction_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    networks:
      - proyectel-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - proyectel-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # MICROSERVICES
  # ============================================
  auth-service:
    build:
      context: .
      dockerfile: src/AuthService/MiniIdentityApi.Api/Dockerfile
    container_name: auth-service
    ports:
      - "5132:5132"
    environment:
      - ASPNETCORE_HTTP_PORTS=5132
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Redis=auth_redis:6379,password=secret-redis
    depends_on:
      authservice_db:
        condition: service_healthy
    networks:
      - proyectel-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5132/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  library-service:
    build:
      context: .
      dockerfile: src/CatalogService/Catalog.Api/Dockerfile
    container_name: library-service
    ports:
      - "5281:5281"
    environment:
      - ASPNETCORE_HTTP_PORTS=5281
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=catalog_postgres;Port=5432;Database=catalog_db;Username=postgres;Password=secret-postgres
    depends_on:
      catalogservice_db:
        condition: service_healthy
    networks:
      - proyectel-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5281/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  interaction-service:
    build:
      context: .
      dockerfile: src/InteractionService/Interaction.Api/Dockerfile
    container_name: interaction-service
    ports:
      - "5144:5144"
    environment:
      - ASPNETCORE_HTTP_PORTS=5144
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=interaction_postgres;Port=5432;Database=interaction_db;Username=postgres;Password=secret-postgres
      - RabbitMQ__HostName=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__UserName=guest
      - RabbitMQ__Password=guest
      - Catalog__BaseUrl=http://library-service:5281
    depends_on:
      interactionservice_db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    networks:
      - proyectel-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5144/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  recommendation-service:
    build:
      context: .
      dockerfile: src/RecommendationService/Recommendation.Api/Dockerfile
    container_name: recommendation-service
    ports:
      - "5180:5180"
    environment:
      - ASPNETCORE_HTTP_PORTS=5180
      - ASPNETCORE_ENVIRONMENT=Production
      - Qdrant__Host=qdrant
      - Qdrant__Port=6333
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
    depends_on:
      - qdrant
      - rabbitmq
    networks:
      - proyectel-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5180/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # FRONTEND
  # ============================================
  frontend:
    build:
      context: ../proyecotelfrontend/ProyectTelFrontend
      dockerfile: Dockerfile
    container_name: proyectel-frontend
    ports:
      - "3000:80"
    environment:
      - AUTH_HOST=auth-service
      - AUTH_PORT=5132
      - LIBRARY_HOST=library-service
      - LIBRARY_PORT=5281
      - INTERACTION_HOST=interaction-service
      - INTERACTION_PORT=5144
    depends_on:
      - auth-service
      - library-service
      - interaction-service
    networks:
      - proyectel-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/index.html"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  pgdata_catalog:
  pgdata_interaction:
  qdrant_data:
  rabbitmq_data:
  redis_data:

networks:
  proyectel-network:
    driver: bridge
